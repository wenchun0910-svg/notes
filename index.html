<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">我的心情札記</title>
    <!-- 引入 Tailwind CSS 進行快速排版與響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 圖示庫 -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 引入 Quill 富文本編輯器 CSS 與 JS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- 引入 SheetJS 用於匯出 Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- 引入 Google Fonts 手繪童趣字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 奶油童趣風格 */
        :root {
            --bg-color: #fdfbf7;
            --primary-blue: #72a1d4;
            --primary-pink: #f29a9a;
            --primary-yellow: #f4d068;
            --text-dark: #4a4a4a;
        }

        body { 
            font-family: 'Mali', 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); 
            /* 輕微的點陣筆記本背景 */
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 24px 24px;
            color: var(--text-dark);
        }
        
        /* 標題與特殊裝飾字體 */
        .title-font { font-family: 'Gaegu', 'Mali', cursive; }
        .handwriting-font { font-family: 'Mali', cursive; }

        .transition-all { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .image-container { overflow: hidden; }
        .image-container img { transition: transform 0.6s ease; }
        .image-container:hover img { transform: scale(1.08) rotate(-1deg); }
        
        /* 手作感按鈕樣式 */
        .doodle-btn {
            border: 2px solid var(--text-dark);
            border-radius: 12px;
            box-shadow: 2px 3px 0 var(--text-dark);
            transition: all 0.1s;
        }
        .doodle-btn:active {
            box-shadow: 0 0 0 var(--text-dark);
            transform: translate(2px, 3px);
        }

        /* 現代感自訂捲軸 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; border: 3px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Quill 編輯器樣式微調 (融合手繪風) */
        .ql-container { font-family: 'Mali', cursive; font-size: 1.05rem; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem; border: 2px solid var(--text-dark) !important; border-top: none !important;}
        .ql-toolbar { border-top-left-radius: 0.75rem; border-top-right-radius: 0.75rem; background-color: #fff; border: 2px solid var(--text-dark) !important; }
        .ql-editor { min-height: 150px; background-color: #fff; border-bottom-left-radius: 0.75rem; border-bottom-right-radius: 0.75rem;}
        
        /* 卡片與全文檢視內富文本顯示微調 */
        /* 新增：word-break: break-all; 與 overflow-wrap: break-word; 強制過長網址自動換行 */
        .rich-text-content {
            word-break: break-all;
            overflow-wrap: break-word;
        }
        .rich-text-content p { margin-bottom: 0.4rem; }
        .rich-text-content a { color: var(--primary-blue); text-decoration: underline; text-decoration-style: wavy; cursor: pointer; word-break: break-all; }
        .ql-editor.view-mode { padding: 0; min-height: auto; overflow-y: visible; background-color: transparent;}

        /* 手繪卡片邊框 */
        .doodle-card {
            background-color: #fff;
            border: 2px solid var(--text-dark);
            border-radius: 16px;
            box-shadow: 4px 6px 0px rgba(74, 74, 74, 0.15);
        }
        .doodle-card:hover {
            box-shadow: 6px 8px 0px rgba(74, 74, 74, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <!-- 頂部裝飾線 -->
    <div class="h-2 w-full bg-gradient-to-r from-[#f29a9a] via-[#f4d068] to-[#72a1d4] absolute top-0 z-50"></div>

    <!-- 導覽列 -->
    <nav class="bg-[#fdfbf7]/90 backdrop-blur-sm sticky top-2 z-40 py-3 border-b-2 border-dashed border-[#d1d5db]">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col xl:flex-row justify-between items-center gap-4">
                
                <!-- 1. 左側：網站標題 -->
                <div class="flex items-center space-x-3 w-full xl:w-auto justify-between xl:justify-start shrink-0">
                    <div class="flex items-center group">
                        <i class="ph-duotone ph-notebook text-[#f29a9a] text-4xl mr-2 -rotate-6"></i>
                        <span id="navTitle" class="font-bold text-2xl text-[#4a4a4a] tracking-wide title-font">我的心情札記</span>
                        <button id="editTitleBtn" onclick="openTitleModal()" class="hidden ml-2 text-[#72a1d4] hover:text-[#5a8bc0] rounded p-1.5 transition-colors doodle-btn bg-white border-none shadow-none" title="修改標題">
                            <i class="ph-bold ph-pencil-simple text-md"></i>
                        </button>
                    </div>
                    <!-- 行動版登入按鈕 -->
                    <button id="authBtnMobile" onclick="toggleAuth()" class="xl:hidden doodle-btn bg-white text-[#4a4a4a] hover:bg-[#f3f4f6] px-3 py-1.5 flex items-center space-x-1 text-sm font-bold">
                        <i class="ph-duotone ph-user-circle text-xl" id="authIconMobile"></i>
                        <span id="authTextMobile" class="title-font">小尖兵</span>
                    </button>
                </div>

                <!-- 2. 中間：搜尋框與系統管理工具 -->
                <div class="flex flex-col lg:flex-row items-center gap-3 w-full xl:w-auto flex-1 xl:justify-end shrink">
                    
                    <!-- 手繪風搜尋框 (縮小寬度並改為膠囊狀圓角) -->
                    <div class="relative w-full lg:w-48 xl:w-56 shrink-0">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph-bold ph-magnifying-glass text-[#4a4a4a] text-lg"></i>
                        </div>
                        <input type="text" id="searchInput" oninput="handleSearch()" class="block w-full pl-9 pr-3 py-1.5 border-2 border-[#5a5a5a] rounded-full leading-5 bg-white placeholder-[#9ca3af] focus:outline-none focus:ring-0 focus:border-[#72a1d4] text-sm font-bold shadow-[2px_2px_0_#e0e0e0] transition-all" placeholder="找找哪一天的回憶...">
                    </div>

                    <!-- 管理員工具列 (登入後顯示) -->
                    <div id="adminToolbar" class="hidden flex flex-wrap lg:flex-nowrap justify-center items-center bg-[#fefce8] p-1.5 rounded-2xl border-2 border-[#f4d068] w-fit shadow-[2px_3px_0_rgba(244,208,104,0.3)] gap-1.5">
                        <span class="text-[#854d0e] font-bold mx-1 hidden 2xl:inline whitespace-nowrap text-sm title-font">
                            <i class="ph-duotone ph-magic-wand text-[#f4d068] mr-1 align-middle text-xl"></i>工具箱
                        </span>
                        
                        <!-- 匯出 Excel 按鈕 -->
                        <button onclick="exportToExcel()" class="doodle-btn bg-[#22c55e] text-white hover:bg-[#16a34a] px-2.5 py-1.5 flex items-center justify-center space-x-1 text-sm" title="匯出 Excel">
                            <i class="ph-bold ph-microsoft-excel-logo text-lg"></i>
                            <span class="hidden md:inline whitespace-nowrap">Excel</span>
                        </button>

                        <!-- 匯出 Word 按鈕 -->
                        <button onclick="exportToWord()" class="doodle-btn bg-[#3b82f6] text-white hover:bg-[#2563eb] px-2.5 py-1.5 flex items-center justify-center space-x-1 text-sm" title="匯出 Word">
                            <i class="ph-bold ph-file-doc text-lg"></i>
                            <span class="hidden md:inline whitespace-nowrap">Word</span>
                        </button>
                        
                        <button onclick="openTagsModal()" class="doodle-btn bg-white text-[#4a4a4a] hover:bg-[#f3f4f6] px-2.5 py-1.5 flex items-center justify-center space-x-1 text-sm">
                            <i class="ph-duotone ph-sticker text-lg text-[#f29a9a]"></i><span class="hidden md:inline whitespace-nowrap">貼紙</span>
                        </button>
                        <button onclick="openAccountListModal()" class="doodle-btn bg-[#72a1d4] text-white hover:bg-[#5a8bc0] px-2.5 py-1.5 flex items-center justify-center space-x-1 text-sm">
                            <i class="ph-duotone ph-users-three text-lg"></i><span class="hidden md:inline whitespace-nowrap">夥伴</span>
                        </button>
                        <button onclick="openPhotoModal()" class="doodle-btn bg-[#f29a9a] text-white hover:bg-[#e07a7a] px-3 py-1.5 flex items-center justify-center space-x-1 text-sm">
                            <i class="ph-bold ph-plus text-lg"></i><span class="whitespace-nowrap">寫日記</span>
                        </button>
                    </div>
                </div>

                <!-- 3. 右側：桌面版登入按鈕 -->
                <div class="hidden xl:flex w-full xl:w-auto justify-end shrink-0">
                    <button id="authBtnDesktop" onclick="toggleAuth()" class="doodle-btn bg-white text-[#4a4a4a] hover:bg-[#f3f4f6] px-4 py-2 flex items-center space-x-2 font-bold title-font text-lg">
                        <i class="ph-duotone ph-user-circle text-2xl" id="authIconDesktop"></i>
                        <span id="authTextDesktop">小尖兵報到</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        
        <!-- 載入中動畫 -->
        <div id="loadingIndicator" class="flex justify-center items-center py-20">
            <div class="text-center relative">
                <i class="ph-duotone ph-paper-plane-tilt animate-bounce text-6xl text-[#72a1d4] mb-4"></i>
                <p class="text-[#4a4a4a] font-bold title-font text-xl">翻開日記本中...</p>
            </div>
        </div>

        <!-- 札記網格 -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        
        <!-- 無資料提示 -->
        <div id="emptyState" class="hidden text-center py-28 text-[#9ca3af]">
            <i class="ph-duotone ph-ghost text-8xl mb-6 text-[#d1d5db]"></i>
            <p class="text-2xl font-bold title-font text-[#4a4a4a]" id="emptyStateText">還沒有寫下任何回憶喔！</p>
        </div>

        <!-- 分頁控制區 -->
        <div id="paginationContainer" class="mt-14 flex justify-center hidden">
            <nav class="relative z-0 inline-flex gap-2" aria-label="Pagination" id="paginationControls"></nav>
        </div>
    </main>

    <footer class="mt-auto py-8">
        <div class="text-center text-sm text-[#9ca3af] font-bold title-font text-lg flex justify-center items-center gap-2" id="footerText">
            <i class="ph-fill ph-heart text-[#f29a9a]"></i> 2026 我的心情札記.
        </div>
    </footer>

    <!-- ================= 互動視窗 (Modals) ================= -->

    <!-- 全文檢視視窗 -->
    <!-- 重大修正：加入 flex flex-col max-h-[85vh] 限制視窗最大高度並設定為彈性盒子排版 -->
    <div id="fullDescModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-[60] hidden flex items-center justify-center backdrop-blur-[2px] p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-6 sm:p-8 max-w-2xl w-full mx-auto relative doodle-card flex flex-col max-h-[85vh]">
            <button onclick="closeModal('fullDescModal')" class="absolute -top-3 -right-3 bg-[#fefce8] border-2 border-[#5a5a5a] text-[#5a5a5a] hover:bg-[#f4d068] w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-[2px_2px_0_#5a5a5a] z-10">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <div class="flex items-center gap-3 border-b-2 border-dashed border-[#d1d5db] pb-4 mb-4 shrink-0">
                <i class="ph-duotone ph-book-open-text text-[#72a1d4] text-3xl"></i>
                <h2 id="fullDescModalTitle" class="text-2xl font-bold text-[#4a4a4a] title-font"></h2>
            </div>
            <!-- 重大修正：加上 overflow-y-auto 讓此區塊可以內部捲動 -->
            <div id="fullDescModalContent" class="ql-editor view-mode rich-text-content text-[#5a5a5a] leading-relaxed overflow-y-auto pr-2 handwriting-font">
                <!-- 全文內容 -->
            </div>
            <!-- 重大修正：加上 shrink-0 與 pt-4 確保底部按鈕區不會被文字擠壓變形 -->
            <div class="mt-6 flex justify-end shrink-0 pt-4 border-t-2 border-dashed border-[#d1d5db]">
                <button onclick="closeModal('fullDescModal')" class="doodle-btn px-6 py-2 bg-[#fdfbf7] hover:bg-[#f3f4f6] text-[#4a4a4a] font-bold">蓋上日記</button>
            </div>
        </div>
    </div>

    <!-- 修改網站標題視窗 -->
    <div id="titleEditModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-50 hidden flex items-center justify-center backdrop-blur-[2px]">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full mx-4 relative doodle-card">
            <h2 class="text-xl font-bold text-[#4a4a4a] mb-4 flex items-center title-font">
                <i class="ph-duotone ph-text-t text-[#72a1d4] mr-2 text-2xl"></i> 幫日記本取名字
            </h2>
            <div class="space-y-4">
                <div>
                    <input type="text" id="editWebsiteTitle" class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:ring-0 focus:border-[#72a1d4] outline-none font-bold">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button onclick="closeModal('titleEditModal')" class="doodle-btn px-4 py-2 bg-white text-[#4a4a4a] font-bold">取消</button>
                    <button onclick="saveWebsiteTitle()" class="doodle-btn px-4 py-2 bg-[#f4d068] text-[#854d0e] font-bold">寫上去</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理心情標籤(貼紙)視窗 -->
    <div id="tagsManageModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-50 hidden flex items-center justify-center backdrop-blur-[2px]">
        <div class="bg-white rounded-3xl p-6 max-w-md w-full mx-4 relative doodle-card">
            <button onclick="closeModal('tagsManageModal')" class="absolute -top-3 -right-3 bg-[#fefce8] border-2 border-[#5a5a5a] text-[#5a5a5a] hover:bg-[#f29a9a] w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-[2px_2px_0_#5a5a5a]">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <h2 class="text-xl font-bold text-[#4a4a4a] mb-4 flex items-center title-font">
                <i class="ph-duotone ph-sticker text-[#f29a9a] mr-2 text-3xl"></i> 貼紙簿 (標籤)
            </h2>
            <div class="flex space-x-2 mb-4">
                <input type="text" id="newTagInput" placeholder="畫一張新貼紙..." class="flex-grow px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#f29a9a] outline-none font-bold">
                <button onclick="addNewTag()" class="doodle-btn bg-[#f29a9a] hover:bg-[#e07a7a] text-white px-4 py-2 font-bold whitespace-nowrap">放進去</button>
            </div>
            <div class="bg-[#fdfbf7] border-2 border-dashed border-[#d1d5db] rounded-2xl p-4 max-h-60 overflow-y-auto">
                <p id="noTagsMsg" class="text-sm text-[#9ca3af] text-center py-4 hidden font-bold">貼紙簿空空的</p>
                <ul id="tagsListContainer" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <!-- 登入視窗 -->
    <div id="loginModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-50 hidden flex items-center justify-center backdrop-blur-[2px]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 transform transition-all doodle-card">
            <div class="text-center mb-6">
                <i class="ph-duotone ph-key text-6xl text-[#f4d068] mb-2 -rotate-12 inline-block"></i>
                <h2 class="text-3xl font-bold text-[#4a4a4a] title-font">通關密語</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="loginUsername" class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none bg-[#fdfbf7] font-bold" placeholder="你是誰？ (帳號)">
                <input type="password" id="loginPassword" class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none bg-[#fdfbf7] font-bold" placeholder="芝麻開門 (密碼)">
                <button onclick="checkLogin()" class="doodle-btn w-full bg-[#72a1d4] hover:bg-[#5a8bc0] text-white font-bold py-3 text-lg flex justify-center items-center mt-2">
                    進去囉！ <i id="loginSpinner" class="ph-bold ph-spinner animate-spin text-xl ml-2 hidden"></i>
                </button>
                <button onclick="closeModal('loginModal')" class="w-full text-[#9ca3af] hover:text-[#4a4a4a] font-bold py-2 mt-2 transition-colors underline decoration-wavy">還是先不要好了</button>
            </div>
        </div>
    </div>

    <!-- 新增/編輯照片視窗 -->
    <div id="photoModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-50 hidden flex items-center justify-center backdrop-blur-[2px] overflow-y-auto py-10">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-3xl w-full mx-4 my-auto relative doodle-card">
            <button onclick="closeModal('photoModal')" class="absolute -top-3 -right-3 bg-[#fefce8] border-2 border-[#5a5a5a] text-[#5a5a5a] hover:bg-[#72a1d4] w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-[2px_2px_0_#5a5a5a] z-10">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <div class="flex items-center mb-6">
                <i class="ph-duotone ph-pencil-line text-[#f29a9a] text-4xl mr-2"></i>
                <h2 id="photoModalTitle" class="text-3xl font-bold text-[#4a4a4a] title-font">寫篇新日記</h2>
            </div>
            
            <form id="photoForm" onsubmit="savePhoto(event)" class="space-y-5">
                <input type="hidden" id="photoId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-md font-bold text-[#4a4a4a] mb-1 title-font">這一天的主題 <span class="text-red-500">*</span></label>
                        <input type="text" id="photoTitle" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-md font-bold text-[#4a4a4a] mb-1 title-font">哪一天的回憶 <span class="text-red-500">*</span></label>
                        <input type="date" id="photoDate" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold handwriting-font">
                    </div>
                </div>

                <!-- 心情標籤選擇區 -->
                <div>
                    <label class="block text-md font-bold text-[#4a4a4a] mb-2 title-font">選幾張貼紙吧 (心情標籤)</label>
                    <div id="tagCheckboxesContainer" class="flex flex-wrap gap-2 p-4 bg-[#fdfbf7] border-2 border-dashed border-[#d1d5db] rounded-2xl min-h-[60px]"></div>
                </div>

                <div class="bg-[#f0f9ff] p-5 rounded-2xl border-2 border-[#72a1d4] space-y-4 relative">
                    <span class="absolute -top-3 -left-3 text-3xl">📎</span>
                    <div>
                        <label class="block text-sm font-bold text-[#1e3a8a] mb-1">相簿雲端抽屜 (點擊後前往的連結) <span class="text-red-500">*</span></label>
                        <input type="url" id="photoUrl" required placeholder="https://..." class="w-full px-4 py-2 border-2 border-[#72a1d4] rounded-xl outline-none font-bold text-sm bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-[#1e3a8a] mb-1">日記封面照 (單張照片連結) <span class="text-red-500">*</span></label>
                        <input type="url" id="thumbnailUrl" required placeholder="https://..." class="w-full px-4 py-2 border-2 border-[#72a1d4] rounded-xl outline-none font-bold text-sm bg-white">
                    </div>
                </div>
                
                <!-- 富文本編輯器 (Quill) -->
                <div>
                    <label class="block text-md font-bold text-[#4a4a4a] mb-1 title-font">心情滴答滴 (寫點什麼...)</label>
                    <div id="quill-editor" class="bg-[#fdfbf7]"></div>
                </div>

                <div class="flex justify-end space-x-4 pt-4 mt-6">
                    <button type="button" onclick="closeModal('photoModal')" class="underline decoration-wavy text-[#9ca3af] hover:text-[#4a4a4a] font-bold px-2">先不寫了</button>
                    <button type="submit" class="doodle-btn px-6 py-2.5 bg-[#f4d068] text-[#854d0e] text-lg font-bold flex items-center title-font">
                        <i class="ph-bold ph-check text-xl mr-1"></i> 寫好了！
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 刪除確認 -->
    <div id="deleteModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-[70] hidden flex items-center justify-center backdrop-blur-[2px]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 text-center doodle-card">
            <i class="ph-duotone ph-eraser text-6xl text-[#f29a9a] mb-2 inline-block -rotate-12"></i>
            <h2 class="text-2xl font-bold mb-6 text-[#4a4a4a] title-font">要擦掉這段回憶嗎？</h2>
            <input type="hidden" id="deleteId"><input type="hidden" id="deleteType" value="photo">
            <div class="flex justify-center space-x-4">
                <button onclick="closeModal('deleteModal')" class="doodle-btn flex-1 py-2 bg-white font-bold">捨不得</button>
                <button onclick="confirmDelete()" class="doodle-btn flex-1 py-2 bg-[#f29a9a] text-white font-bold">擦掉吧</button>
            </div>
        </div>
    </div>

    <!-- 帳號管理清單 -->
    <!-- 重大修正：加入 max-h-[85vh] 與內部捲軸 -->
    <div id="accountListModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-[60] hidden flex items-center justify-center backdrop-blur-[2px] p-4">
        <div class="bg-white rounded-3xl p-6 sm:p-8 max-w-lg w-full mx-auto relative doodle-card flex flex-col max-h-[85vh]">
            <button onclick="closeModal('accountListModal')" class="absolute -top-3 -right-3 bg-[#fefce8] border-2 border-[#5a5a5a] text-[#5a5a5a] hover:bg-[#f4d068] w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-[2px_2px_0_#5a5a5a] z-10">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <div class="flex justify-between items-center mb-4 border-b-2 border-dashed border-[#d1d5db] pb-4 shrink-0">
                <h2 class="text-2xl font-bold text-[#4a4a4a] flex items-center title-font">
                    <i class="ph-duotone ph-users-three text-[#72a1d4] mr-2 text-3xl"></i> 小尖兵名單
                </h2>
                <button onclick="openAccountEditModal()" class="doodle-btn bg-[#fdfbf7] text-[#4a4a4a] px-3 py-1.5 text-sm font-bold flex items-center">
                    <i class="ph-bold ph-plus mr-1"></i> 新夥伴
                </button>
            </div>
            <!-- 內部捲軸區域 -->
            <div class="overflow-y-auto pr-2 bg-[#fdfbf7] rounded-xl border-2 border-[#5a5a5a] p-2">
                <table class="min-w-full"><tbody id="userListBody" class="divide-y-2 divide-dashed divide-[#d1d5db]"></tbody></table>
            </div>
        </div>
    </div>

    <!-- 新增/編輯帳號 -->
    <div id="accountEditModal" class="fixed inset-0 bg-[#4a4a4a] bg-opacity-40 z-[70] hidden flex items-center justify-center backdrop-blur-[2px]">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 relative doodle-card">
            <h2 id="accountEditModalTitle" class="text-2xl font-bold mb-6 text-[#4a4a4a] title-font flex items-center">
                <i class="ph-duotone ph-user-plus text-[#f4d068] text-3xl mr-2"></i> 新夥伴加入
            </h2>
            <form onsubmit="saveUser(event)" class="space-y-5">
                <input type="hidden" id="editUserId">
                <input type="text" id="editUsername" required class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold" placeholder="叫什麼名字？ (帳號)">
                <input type="password" id="editPassword" required class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold" placeholder="設定通關密語">
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal('accountEditModal')" class="doodle-btn px-4 py-2 bg-white font-bold">取消</button>
                    <button type="submit" class="doodle-btn px-4 py-2 bg-[#72a1d4] text-white font-bold">加入</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 吐司通知 -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-[80] flex items-center bg-white border-2 border-[#5a5a5a] text-[#4a4a4a] px-6 py-4 rounded-2xl shadow-[4px_4px_0_#5a5a5a] pointer-events-none">
        <i id="toastIcon" class="ph-duotone ph-check-circle text-[#22c55e] text-3xl mr-3"></i>
        <span id="toastMessage" class="font-bold text-lg title-font">操作成功</span>
    </div>

    <!-- ================= JavaScript 邏輯 ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化變數
        let app, auth, db, currentUser;
        const systemAppId = 'default-album-app'; 

        // 狀態與資料
        let isAdmin = false;
        let usersData = [];
        let photosData = [];
        let globalSettings = { title: '我的心情札記', moodTags: [] };
        
        let currentPage = 1;
        const itemsPerPage = 8;
        let searchQuery = '';
        let quillEditor;

        // --- 1. 系統初始化 ---
        const initSystem = async () => {
            try {
                quillEditor = new Quill('#quill-editor', {
                    theme: 'snow',
                    placeholder: '今天發生了什麼有趣的事呢...',
                    modules: {
                        toolbar: [
                            [{ 'size': ['small', false, 'large', 'huge'] }],
                            [{ 'color': [] }, { 'background': [] }],
                            ['bold', 'italic', 'underline', 'strike'],
                            ['link', 'clean']
                        ]
                    }
                });

            const firebaseConfig = {
  apiKey: "AIzaSyAVzW3LPgAlVvMffZwNM_wHE6HekTAkh_E",
  authDomain: "notes-6120f.firebaseapp.com",
  projectId: "notes-6120f",
  storageBucket: "notes-6120f.firebasestorage.app",
  messagingSenderId: "705096024933",
  appId: "1:705096024933:web:a40e106ef03d63a419178c"
};

                
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) setupRealtimeListeners();
                });

            } catch (error) {
                console.error("Initialization Error:", error);
                document.getElementById('loadingIndicator').innerHTML = `<p class="text-red-500 font-bold">哎呀！筆記本好像打不開...</p>`;
            }
        };

        // --- 2. 即時監聽 ---
        const setupRealtimeListeners = () => {
            if (!currentUser) return;

            onSnapshot(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), (docSnap) => {
                if (docSnap.exists()) globalSettings = docSnap.data();
                else globalSettings = { title: '我的心情札記', moodTags: [] };
                updateGlobalUI();
            });

            onSnapshot(collection(db, 'artifacts', systemAppId, 'public', 'data', 'albums'), (snapshot) => {
                photosData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('loadingIndicator').classList.add('hidden');
                renderGallery();
            });

            onSnapshot(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), (snapshot) => {
                usersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUsers();
            });
        };

        const updateGlobalUI = () => {
            document.title = globalSettings.title;
            document.getElementById('navTitle').innerText = globalSettings.title;
            document.getElementById('footerText').innerHTML = `<i class="ph-fill ph-heart text-[#f29a9a]"></i> 2026 ${globalSettings.title}.`;
            renderTagCheckboxes();
            renderManageTagsList();
        };

        // --- 3. 畫面渲染 ---
        const formatImageUrl = (url) => {
            if (!url) return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=)([-a-zA-Z0-9_]+)/);
            if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            return url; 
        };

        const renderGallery = () => {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            let filteredData = photosData;
            if (searchQuery) {
                filteredData = photosData.filter(photo => {
                    const cleanDesc = photo.desc ? photo.desc.replace(/<[^>]*>?/gm, '') : '';
                    return (photo.title && photo.title.toLowerCase().includes(searchQuery)) || 
                           (cleanDesc.toLowerCase().includes(searchQuery));
                });
            }

            if (filteredData.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('paginationContainer').classList.add('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                const sortedData = [...filteredData].sort((a, b) => new Date(b.date) - new Date(a.date));

                const totalPages = Math.ceil(sortedData.length / itemsPerPage);
                if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
                
                const paginatedData = sortedData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

                paginatedData.forEach(photo => {
                    let targetUrl = photo.url; let thumbUrl = photo.url;
                    if (photo.url && photo.url.includes("|||")) {
                        const parts = photo.url.split("|||"); targetUrl = parts[0]; thumbUrl = parts[1];
                    }

                    let tagsHtml = '';
                    if (photo.tags && photo.tags.length > 0) {
                        const colors = ['bg-[#fefce8] text-[#854d0e]', 'bg-[#f0f9ff] text-[#1e3a8a]', 'bg-[#fdf2f8] text-[#9f1239]', 'bg-[#f0fdf4] text-[#166534]'];
                        tagsHtml = `<div class="flex flex-wrap gap-2 mt-1 mb-2">` + 
                            photo.tags.map((t, i) => `<span class="${colors[i%colors.length]} border-2 border-[#5a5a5a] text-xs px-2 py-0.5 rounded-md font-bold shadow-[1px_1px_0_#5a5a5a] -rotate-1">${t}</span>`).join('') + 
                            `</div>`;
                    }

                    let adminButtons = isAdmin ? `
                        <div class="absolute top-3 right-3 flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                            <button onclick="editPhoto(event, '${photo.id}')" class="doodle-btn bg-[#f4d068] text-[#4a4a4a] p-2 hover:bg-[#fefce8]"><i class="ph-bold ph-pencil-simple text-lg"></i></button>
                            <button onclick="promptDelete(event, '${photo.id}', 'photo')" class="doodle-btn bg-[#f29a9a] text-white p-2 hover:bg-[#fdf2f8] hover:text-[#f29a9a]"><i class="ph-bold ph-trash text-lg"></i></button>
                        </div>` : '';

                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = photo.desc || '';
                    const plainText = tempDiv.textContent || tempDiv.innerText || "";
                    const needsReadMore = plainText.length > 45;

                    const readMoreBtn = needsReadMore ? 
                        `<button onclick="openFullDesc(event, '${photo.id}')" class="text-[#72a1d4] hover:text-[#5a8bc0] text-sm font-bold flex items-center transition-colors z-20 relative underline decoration-wavy decoration-[#f4d068] underline-offset-4"><i class="ph-duotone ph-book-open-text mr-1 text-xl"></i>看整篇</button>` : '';

                    const card = document.createElement('div');
                    card.className = "doodle-card flex flex-col relative group overflow-hidden bg-[#fdfbf7]";
                    card.innerHTML = `
                        ${adminButtons}
                        <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" onclick="recordView('${photo.id}')" class="flex-grow flex flex-col group/link relative z-10 p-2 pb-0">
                            <div class="image-container relative w-full pt-[75%] border-2 border-[#5a5a5a] rounded-xl bg-white">
                                <img src="${formatImageUrl(thumbUrl)}" onerror="if(this.src.includes('thumbnail')){ this.src=this.src.replace('thumbnail?id=','uc?export=view&id=').replace('&sz=w1000',''); } else { this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCA4MDAgNjAwIiBwcmVzZXJ2ZUFzcGVjdFJhdGlvPSJub25lIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmRmYmY3Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJNYWxpIiBmb250LXNpemU9IjI0IiBmaWxsPSIjOWNhM2FmIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7ms5LmnInnhA+niYfll688L3RleHQ+PC9zdmc+'; }" class="absolute top-0 left-0 w-full h-full object-cover rounded-lg">
                                <div class="absolute inset-0 bg-[#fefce8] bg-opacity-0 group-hover/link:bg-opacity-60 transition-all duration-300 flex items-center justify-center rounded-lg">
                                    <div class="bg-white text-[#4a4a4a] px-5 py-2.5 rounded-xl font-bold opacity-0 group-hover/link:opacity-100 transform translate-y-4 group-hover/link:translate-y-0 transition-all duration-300 flex items-center doodle-btn title-font text-lg">
                                        <i class="ph-duotone ph-folder-open mr-2 text-2xl text-[#f4d068]"></i> 打開雲端抽屜
                                    </div>
                                </div>
                            </div>
                            <div class="p-3 pt-4 flex-grow flex flex-col relative">
                                <h3 class="font-bold text-xl text-[#4a4a4a] line-clamp-1 group-hover/link:text-[#72a1d4] transition-colors title-font">${photo.title}</h3>
                                <p class="text-sm text-[#9ca3af] flex items-center mt-1 font-medium handwriting-font">
                                    <i class="ph-duotone ph-calendar-blank mr-1 text-[#9ca3af]"></i> ${photo.date}
                                </p>
                                ${tagsHtml}
                                <div class="flex flex-col mt-3 pt-3 border-t border-dashed border-[#d1d5db] flex-grow">
                                    <div class="text-[#5a5a5a] text-sm line-clamp-3 pr-1 rich-text-content leading-relaxed handwriting-font">${photo.desc || '沒有寫下隻字片語...'}</div>
                                    <div class="flex justify-between items-end mt-auto pt-2">
                                        <div>${readMoreBtn}</div>
                                        <div class="flex items-center text-[#72a1d4] text-xs shrink-0 bg-[#fdfbf7] border border-[#e0e0e0] px-2.5 py-1.5 rounded-xl shadow-sm" title="瀏覽人次">
                                            <i class="ph-duotone ph-eye mr-1.5 text-[#72a1d4]"></i><span id="view-count-${photo.id}" class="font-bold">${photo.views || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });
                renderPagination(sortedData.length, totalPages);
            }
        };

        // --- 4. 分頁邏輯 ---
        const changePage = (page) => { currentPage = page; renderGallery(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        const renderPagination = (totalItems, totalPages) => {
            const controls = document.getElementById('paginationControls');
            document.getElementById('paginationContainer').classList.toggle('hidden', totalPages <= 1);
            if(totalPages <= 1) return;
            
            controls.innerHTML = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="doodle-btn w-10 h-10 flex items-center justify-center bg-white ${currentPage===1?'opacity-50 cursor-not-allowed':'hover:bg-[#fefce8]'}"><i class="ph-bold ph-caret-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                controls.innerHTML += `<button onclick="changePage(${i})" class="doodle-btn w-10 h-10 flex items-center justify-center font-bold title-font text-lg ${i===currentPage?'bg-[#f29a9a] text-white':'bg-white hover:bg-[#fefce8] text-[#4a4a4a]'}">${i}</button>`;
            }
            controls.innerHTML += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="doodle-btn w-10 h-10 flex items-center justify-center bg-white ${currentPage===totalPages?'opacity-50 cursor-not-allowed':'hover:bg-[#fefce8]'}"><i class="ph-bold ph-caret-right"></i></button>`;
        };

        // --- 5. Firebase 操作 ---

        const saveWebsiteTitle = async () => {
            const newTitle = document.getElementById('editWebsiteTitle').value.trim();
            if (!newTitle) return;
            try {
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { title: newTitle }, { merge: true });
                closeModal('titleEditModal'); showToast("換了新名字囉！");
            } catch (e) { showToast("修改失敗", "error"); }
        };

        const renderManageTagsList = () => {
            const list = document.getElementById('tagsListContainer');
            const noMsg = document.getElementById('noTagsMsg');
            list.innerHTML = '';
            const tags = globalSettings.moodTags || [];
            if(tags.length === 0) { noMsg.classList.remove('hidden'); return; }
            noMsg.classList.add('hidden');
            tags.forEach((tag, index) => {
                list.innerHTML += `
                    <li class="flex justify-between items-center bg-white border-2 border-[#5a5a5a] px-3 py-2 rounded-xl">
                        <span class="text-sm font-bold text-[#4a4a4a]">${tag}</span>
                        <button onclick="deleteTag(${index})" class="text-[#f29a9a] hover:bg-[#fdf2f8] p-1 rounded-lg transition-colors"><i class="ph-bold ph-trash"></i></button>
                    </li>`;
            });
        };

        const renderTagCheckboxes = () => {
            const container = document.getElementById('tagCheckboxesContainer');
            if(!container) return;
            const tags = globalSettings.moodTags || [];
            if(tags.length === 0) { container.innerHTML = '<span class="text-[#9ca3af] text-sm font-bold">可以先去工具箱新增貼紙喔</span>'; return; }
            container.innerHTML = tags.map((tag, i) => `
                <label class="inline-flex items-center bg-white border-2 border-[#5a5a5a] px-3 py-1.5 rounded-xl cursor-pointer hover:bg-[#fefce8] transition-colors shadow-[1px_1px_0_#5a5a5a]">
                    <input type="checkbox" value="${tag}" class="form-checkbox h-4 w-4 text-[#72a1d4] rounded border-[#5a5a5a] tag-checkbox focus:ring-0">
                    <span class="ml-2 text-sm text-[#4a4a4a] font-bold">${tag}</span>
                </label>`).join('');
        };

        const addNewTag = async () => {
            const input = document.getElementById('newTagInput'); const newTag = input.value.trim();
            if (!newTag) return;
            const currentTags = globalSettings.moodTags || [];
            if(currentTags.includes(newTag)) { showToast("這張貼紙有了喔", "error"); return; }
            try {
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { moodTags: [...currentTags, newTag] }, { merge: true });
                input.value = ''; showToast("貼紙畫好囉！");
            } catch (e) { showToast("新增失敗", "error"); }
        };

        const deleteTag = async (index) => {
            try {
                let tags = [...globalSettings.moodTags]; tags.splice(index, 1);
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { moodTags: tags }, { merge: true });
                showToast("貼紙丟掉囉！");
            } catch(e) { showToast("刪除失敗", "error"); }
        };

        const savePhoto = async (event) => {
            event.preventDefault();
            if (!currentUser) return;
            const checkedTags = Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb => cb.value);
            const richDesc = quillEditor.root.innerHTML;
            const id = document.getElementById('photoId').value;
            const combinedUrl = document.getElementById('photoUrl').value + "|||" + document.getElementById('thumbnailUrl').value;
            const payload = {
                title: document.getElementById('photoTitle').value, url: combinedUrl, date: document.getElementById('photoDate').value,
                desc: richDesc === '<p><br></p>' ? '' : richDesc, tags: checkedTags
            };
            closeModal('photoModal');
            try {
                if (id) { await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id), payload); showToast("日記改好囉"); } 
                else { payload.views = 0; await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'albums'), payload); showToast("新日記寫好囉"); }
            } catch (error) { showToast("筆斷掉了(儲存失敗)", "error"); }
        };

        const editPhoto = (event, id) => {
            event.preventDefault(); event.stopPropagation();
            const photo = photosData.find(p => p.id === id); if (!photo) return;
            let targetUrl = photo.url || ''; let thumbUrl = photo.url || '';
            if (photo.url && photo.url.includes("|||")) { const parts = photo.url.split("|||"); targetUrl = parts[0]; thumbUrl = parts[1]; }
            document.getElementById('photoId').value = photo.id; document.getElementById('photoTitle').value = photo.title;
            document.getElementById('photoUrl').value = targetUrl; document.getElementById('thumbnailUrl').value = thumbUrl;
            document.getElementById('photoDate').value = photo.date;
            quillEditor.root.innerHTML = photo.desc || '';
            document.querySelectorAll('.tag-checkbox').forEach(cb => { cb.checked = (photo.tags && photo.tags.includes(cb.value)); });
            document.getElementById('photoModalTitle').innerText = '修改日記'; document.getElementById('photoModal').classList.remove('hidden');
        };

        const recordView = async (id) => {
            const photo = photosData.find(p => p.id === id);
            if (photo && currentUser) {
                const newViews = (photo.views || 0) + 1;
                document.getElementById(`view-count-${id}`).innerText = newViews;
                await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id), { views: newViews });
            }
        };

        const promptDelete = (event, id, type) => {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            document.getElementById('deleteId').value = id; document.getElementById('deleteType').value = type;
            document.getElementById('deleteModal').classList.remove('hidden');
        };

        const confirmDelete = async () => {
            if (!currentUser) return;
            const id = document.getElementById('deleteId').value, type = document.getElementById('deleteType').value;
            closeModal('deleteModal');
            try {
                if (type === 'photo') { await deleteDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id)); showToast("回憶擦掉了"); }
                else { await deleteDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'accounts', id)); showToast("夥伴離開了"); }
            } catch (error) { showToast("擦不掉耶", "error"); }
        };

        const openFullDesc = (event, id) => {
            event.preventDefault(); event.stopPropagation();
            const photo = photosData.find(p => p.id === id);
            if (photo) {
                document.getElementById('fullDescModalTitle').innerText = photo.title;
                document.getElementById('fullDescModalContent').innerHTML = photo.desc || '沒有留下文字...';
                document.getElementById('fullDescModal').classList.remove('hidden');
            }
        };

        // --- 匯出功能 (Excel 與 Word) ---
        
        // 匯出 Excel
        const exportToExcel = () => {
            if (photosData.length === 0) { showToast("沒有日記可以匯出喔", "error"); return; }
            
            // 轉換資料格式，過濾掉不需要的 id
            const exportData = photosData.map(p => {
                // 清理 HTML 標籤取得純文字
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = p.desc || '';
                const plainDesc = tempDiv.textContent || tempDiv.innerText || "";
                
                let targetUrl = p.url || '';
                if (p.url && p.url.includes("|||")) { targetUrl = p.url.split("|||")[0]; }

                return {
                    "日期": p.date || "",
                    "主題標題": p.title || "",
                    "心情標籤": p.tags ? p.tags.join(", ") : "",
                    "日記內容": plainDesc.trim(),
                    "瀏覽人次": p.views || 0,
                    "雲端連結": targetUrl
                };
            });
            
            // 依照日期排序 (新 -> 舊)
            exportData.sort((a, b) => new Date(b["日期"]) - new Date(a["日期"]));

            try {
                const worksheet = XLSX.utils.json_to_sheet(exportData);
                // 設定欄寬
                worksheet['!cols'] = [ {wch:12}, {wch:25}, {wch:15}, {wch:40}, {wch:10}, {wch:30} ];
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "心情札記列表");
                XLSX.writeFile(workbook, `${globalSettings.title}_名冊匯出.xlsx`);
                showToast("Excel 下載成功！");
            } catch (error) {
                console.error("Export Excel failed", error);
                showToast("Excel 匯出失敗", "error");
            }
        };

        // 匯出 Word (.doc)
        const exportToWord = () => {
            if (photosData.length === 0) { showToast("沒有日記可以匯出喔", "error"); return; }
            
            // 依照日期排序 (新 -> 舊)
            const sortedData = [...photosData].sort((a, b) => new Date(b.date) - new Date(a.date));

            // 組合 HTML 結構給 Word 讀取
            let htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>${globalSettings.title}</title>
                    <style>
                        body { font-family: 'Microsoft JhengHei', 'PMingLiU', sans-serif; }
                        h1 { text-align: center; color: #4a4a4a; font-size: 24pt; border-bottom: 2px solid #72a1d4; padding-bottom: 10px; }
                        .entry { border: 1px solid #d1d5db; padding: 15px; margin-bottom: 20px; background-color: #fdfbf7; border-radius: 8px; }
                        .title { font-size: 16pt; font-weight: bold; color: #72a1d4; margin-top: 0; margin-bottom: 5px; }
                        .meta { color: #9ca3af; font-size: 10pt; margin-bottom: 10px; }
                        .tags { color: #f29a9a; font-size: 10pt; font-weight: bold; }
                        .content { color: #4a4a4a; font-size: 12pt; line-height: 1.5; margin-top: 15px; }
                        .link { font-size: 10pt; margin-top: 15px; }
                    </style>
                </head>
                <body>
                    <h1>${globalSettings.title}</h1>
            `;

            sortedData.forEach(p => {
                let targetUrl = p.url || '';
                if (p.url && p.url.includes("|||")) { targetUrl = p.url.split("|||")[0]; }
                
                const tagsStr = p.tags && p.tags.length > 0 ? `<br><span class='tags'>[貼紙] ${p.tags.join(', ')}</span>` : '';
                
                htmlContent += `
                    <div class='entry'>
                        <div class='title'>${p.title}</div>
                        <div class='meta'>日期: ${p.date} | 瀏覽人次: ${p.views || 0} ${tagsStr}</div>
                        <div class='content'>${p.desc || '沒有留下文字...'}</div>
                        <div class='link'><a href="${targetUrl}">打開雲端相簿</a></div>
                    </div>
                `;
            });

            htmlContent += "</body></html>";

            try {
                // 將 HTML 轉換為 Blob 準備下載
                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${globalSettings.title}_備份.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast("Word 備份成功！");
            } catch (error) {
                console.error("Export Word failed", error);
                showToast("Word 匯出失敗", "error");
            }
        };

        // --- 6. 權限與登入 ---
        const toggleAuth = () => {
            if (isAdmin) { isAdmin = false; updateAuthUI(); showToast("小尖兵先走囉"); } 
            else { document.getElementById('loginModal').classList.remove('hidden'); }
        };

        const checkLogin = async () => {
            const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
            if (!u || !p) { showToast("要輸入通關密語喔！", "error"); return; }
            if (usersData.find(usr => usr.username === u && usr.password === p)) {
                isAdmin = true; closeModal('loginModal'); updateAuthUI(); showToast("歡迎回來！");
            } else if (usersData.length === 0 && u === 'admin' && p === 'admin123') {
                isAdmin = true; await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), { username: u, password: p });
                closeModal('loginModal'); updateAuthUI(); showToast("第一個小尖兵報到！");
            } else { showToast("密語好像不對喔", "error"); }
        };

        const updateAuthUI = () => {
            document.getElementById('authTextDesktop').innerText = isAdmin ? "登出" : "小尖兵報到";
            document.getElementById('authIconDesktop').className = isAdmin ? "ph-duotone ph-sign-out text-2xl text-[#f29a9a]" : "ph-duotone ph-user-circle text-2xl text-[#4a4a4a]";
            document.getElementById('authTextMobile').innerText = isAdmin ? "登出" : "小尖兵";
            document.getElementById('authIconMobile').className = isAdmin ? "ph-duotone ph-sign-out text-xl text-[#f29a9a]" : "ph-duotone ph-user-circle text-xl text-[#4a4a4a]";
            
            document.getElementById('adminToolbar').classList.toggle('hidden', !isAdmin);
            document.getElementById('editTitleBtn').classList.toggle('hidden', !isAdmin);
            renderGallery();
        };

        // 帳號 CRUD
        const renderUsers = () => {
            document.getElementById('userListBody').innerHTML = usersData.length ? usersData.map(u => `
                <tr class="hover:bg-[#fefce8]"><td class="px-4 py-3 text-sm font-bold text-[#4a4a4a] title-font text-lg">${u.username}</td>
                <td class="px-4 py-3 text-right">
                    <button onclick="editUser('${u.id}')" class="doodle-btn px-2 py-1 bg-white text-[#72a1d4] mr-2 text-xs">改密語</button>
                    <button onclick="promptDelete(null, '${u.id}', 'user')" class="doodle-btn px-2 py-1 bg-[#f29a9a] text-white text-xs">請他走</button>
                </td></tr>`).join('') 
                : '<tr><td colspan="2" class="px-5 py-6 text-center text-[#9ca3af] font-bold">目前沒有夥伴</td></tr>';
        };

        const saveUser = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const payload = { username: document.getElementById('editUsername').value, password: document.getElementById('editPassword').value };
            closeModal('accountEditModal');
            id ? await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'accounts', id), payload) : await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), payload);
            showToast(id ? "密語換好了" : "新夥伴加入囉");
        };

        // --- 7. UI 控制函數 ---
        const handleSearch = () => { searchQuery = document.getElementById('searchInput').value.trim().toLowerCase(); currentPage = 1; renderGallery(); };
        const closeModal = (id) => document.getElementById(id).classList.add('hidden');
        const openTitleModal = () => { document.getElementById('editWebsiteTitle').value = globalSettings.title; document.getElementById('titleEditModal').classList.remove('hidden'); };
        const openTagsModal = () => { document.getElementById('tagsManageModal').classList.remove('hidden'); };
        const openAccountListModal = () => document.getElementById('accountListModal').classList.remove('hidden');
        const openAccountEditModal = () => { document.getElementById('editUserId').value = ''; document.getElementById('accountEditModalTitle').innerHTML = '<i class="ph-duotone ph-user-plus text-[#f4d068] text-3xl mr-2"></i> 新夥伴加入'; document.getElementById('accountEditModal').classList.remove('hidden'); };
        const editUser = (id) => { const u = usersData.find(x => x.id === id); document.getElementById('editUserId').value = u.id; document.getElementById('editUsername').value = u.username; document.getElementById('editPassword').value = u.password; document.getElementById('accountEditModalTitle').innerHTML = '<i class="ph-duotone ph-key text-[#72a1d4] text-3xl mr-2"></i> 換個密語'; document.getElementById('accountEditModal').classList.remove('hidden'); };
        const openPhotoModal = () => { document.getElementById('photoForm').reset(); document.getElementById('photoId').value = ''; document.getElementById('photoDate').value = new Date().toISOString().split('T')[0]; quillEditor.root.innerHTML = ''; document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false); document.getElementById('photoModalTitle').innerText = '寫篇新日記'; document.getElementById('photoModal').classList.remove('hidden'); };
        
        let toastTimeout;
        const showToast = (msg, type = 'success') => {
            document.getElementById('toastMessage').innerText = msg;
            document.getElementById('toastIcon').className = type === 'success' ? "ph-duotone ph-check-circle text-[#22c55e] text-4xl mr-3" : "ph-duotone ph-warning-circle text-[#f29a9a] text-4xl mr-3";
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        };

        // 綁定全域
        Object.assign(window, { toggleAuth, checkLogin, closeModal, openPhotoModal, editPhoto, savePhoto, promptDelete, confirmDelete, recordView, openAccountListModal, openAccountEditModal, editUser, saveUser, handleSearch, changePage, openTitleModal, saveWebsiteTitle, openTagsModal, addNewTag, deleteTag, openFullDesc, exportToExcel, exportToWord });

        initSystem();
    </script>
</body>
</html>
