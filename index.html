<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">我的心情札記</title>
    <!-- 引入 Tailwind CSS 進行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Phosphor Icons 圖示庫 (改為雙色 doodle 風格) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 引入 Quill 富文本編輯器 -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- 引入可愛手寫風格的 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Mali:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* 可愛手帳風格 */
        :root {
            --bg-color: #fcfaf5; /* 奶油筆記本底色 */
            --primary-blue: #72a1d4; /* 手帳藍 */
            --accent-pink: #f29a9a;  /* 可愛粉 */
            --accent-yellow: #f4d068; /* 螢光黃 */
            --text-dark: #4a4a4a; /* 手寫黑/深灰 */
        }

        body { 
            font-family: 'Mali', 'Gaegu', 'Comic Sans MS', cursive, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-dark);
            /* 微微的點陣背景，像是筆記本 */
            background-image: radial-gradient(#e0ded8 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* 標題特別使用 Gaegu 字體增加手繪感 */
        .title-font { font-family: 'Gaegu', cursive; font-weight: 700; }
        
        .transition-all { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .image-container { overflow: hidden; border-radius: 8px 8px 0 0; }
        .image-container img { transition: transform 0.5s ease; }
        .image-container:hover img { transform: scale(1.08) rotate(1deg); } /* 懸停時略微傾斜 */
        
        /* 手繪風不規則邊框與陰影 */
        .doodle-card {
            background-color: white;
            border: 2px solid #5a5a5a;
            border-radius: 12px 2px 12px 4px; /* 不規則圓角 */
            box-shadow: 4px 6px 0px rgba(90, 90, 90, 0.15); /* 實色偏移陰影，很有塗鴉感 */
        }
        .doodle-card:hover {
            box-shadow: 6px 8px 0px rgba(90, 90, 90, 0.2);
            transform: translateY(-2px);
        }

        /* 手繪風按鈕 */
        .doodle-btn {
            border: 2px solid #5a5a5a;
            border-radius: 20px 8px 20px 8px;
            box-shadow: 2px 3px 0px rgba(90, 90, 90, 0.2);
            font-weight: 600;
            transition: all 0.2s;
        }
        .doodle-btn:active {
            box-shadow: 0px 0px 0px rgba(90, 90, 90, 0.2);
            transform: translate(2px, 3px);
        }

        /* 捲軸可愛化 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-pink); border-radius: 10px; border: 2px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: #e07a7a; }

        /* Quill 編輯器樣式微調以符合手寫風 */
        .ql-container { font-family: 'Mali', cursive; font-size: 1.1rem; border-color: #5a5a5a !important; border-radius: 0 0 10px 10px; }
        .ql-toolbar { border-color: #5a5a5a !important; border-radius: 10px 10px 0 0; background-color: #fdfdfd; border-width: 2px 2px 0 2px !important; }
        .ql-editor { min-height: 150px; }
        
        .rich-text-content p { margin-bottom: 0.5rem; line-height: 1.6; }
        .rich-text-content a { color: var(--primary-blue); text-decoration: underline; text-decoration-style: wavy; cursor: pointer; font-weight: bold; }
        .ql-editor.view-mode { padding: 0; min-height: auto; overflow-y: visible; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- 導覽列 (手帳風格頂部) -->
    <nav class="bg-white border-b-4 border-[#5a5a5a] sticky top-0 z-40 py-3 shadow-[0_4px_0_rgba(0,0,0,0.05)]">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col xl:flex-row justify-between items-center gap-4">
                
                <!-- 1. 左側：網站標題 -->
                <div class="flex items-center space-x-3 w-full xl:w-auto justify-between xl:justify-start shrink-0">
                    <div class="flex items-center group">
                        <i class="ph-duotone ph-book-bookmark text-[#f29a9a] text-4xl mr-2 -rotate-6"></i>
                        <span id="navTitle" class="title-font text-3xl text-[#4a4a4a] tracking-wider relative">
                            我的心情札記
                            <span class="absolute -bottom-1 left-0 w-full h-1 bg-[#f4d068] -z-10 rounded-full opacity-60"></span>
                        </span>
                        <button id="editTitleBtn" onclick="openTitleModal()" class="hidden ml-3 text-[#72a1d4] hover:text-[#5a5a5a] transition-colors" title="換個手帳名字">
                            <i class="ph-duotone ph-pencil-line text-2xl"></i>
                        </button>
                    </div>
                    <!-- 行動版登入按鈕 -->
                    <button id="authBtnMobile" onclick="toggleAuth()" class="xl:hidden doodle-btn bg-white px-4 py-1.5 flex items-center space-x-2 text-[#4a4a4a]">
                        <i class="ph-duotone ph-user-circle text-xl" id="authIconMobile"></i>
                        <span id="authTextMobile" class="font-bold">小尖兵</span>
                    </button>
                </div>

                <!-- 2. 中間：搜尋框與系統管理工具 -->
                <div class="flex flex-col lg:flex-row items-center gap-4 w-full xl:w-auto flex-1 xl:justify-end">
                    
                    <!-- 手繪風搜尋框 -->
                    <div class="relative w-full lg:w-80 shrink-0">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ph-bold ph-magnifying-glass text-[#4a4a4a] text-lg"></i>
                        </div>
                        <input type="text" id="searchInput" oninput="handleSearch()" class="block w-full pl-10 pr-3 py-2.5 border-2 border-[#5a5a5a] rounded-2xl leading-5 bg-white placeholder-[#9ca3af] focus:outline-none focus:ring-0 focus:border-[#72a1d4] sm:text-md font-bold shadow-[2px_2px_0_#e0e0e0] transition-all" placeholder="找找哪一天的回憶...">
                    </div>

                    <!-- 管理員工具列 (登入後顯示) -->
                    <div id="adminToolbar" class="hidden flex items-center bg-[#fefce8] p-2 rounded-2xl border-2 border-[#f4d068] w-full lg:w-auto overflow-x-auto shadow-[2px_3px_0_rgba(244,208,104,0.3)]">
                        <span class="text-[#854d0e] font-bold mx-2 hidden 2xl:inline whitespace-nowrap text-md title-font">
                            <i class="ph-duotone ph-magic-wand text-[#f4d068] mr-1 align-middle text-2xl"></i>手帳工具箱
                        </span>
                        <div class="flex space-x-3 w-full lg:w-auto pl-1">
                            <button onclick="openTagsModal()" class="doodle-btn bg-white text-[#4a4a4a] hover:bg-[#f3f4f6] px-3 py-1.5 flex items-center justify-center flex-1 lg:flex-none space-x-1.5 text-sm">
                                <i class="ph-duotone ph-sticker text-xl text-[#f29a9a]"></i><span class="whitespace-nowrap">可愛貼紙</span>
                            </button>
                            <button onclick="openAccountListModal()" class="doodle-btn bg-[#72a1d4] text-white hover:bg-[#5a8bc0] px-3 py-1.5 flex items-center justify-center flex-1 lg:flex-none space-x-1.5 text-sm">
                                <i class="ph-duotone ph-users-three text-xl"></i><span class="whitespace-nowrap">夥伴名單</span>
                            </button>
                            <button onclick="openPhotoModal()" class="doodle-btn bg-[#f29a9a] text-white hover:bg-[#e07a7a] px-4 py-1.5 flex items-center justify-center flex-1 lg:flex-none space-x-1.5 text-sm">
                                <i class="ph-bold ph-plus text-xl"></i><span class="whitespace-nowrap">寫新日記</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 3. 右側：桌面版登入按鈕 -->
                <div class="hidden xl:flex w-full xl:w-auto justify-end shrink-0 pl-4 border-l-2 border-dashed border-[#d1d5db]">
                    <button id="authBtnDesktop" onclick="toggleAuth()" class="doodle-btn bg-white hover:bg-[#f9fafb] text-[#4a4a4a] px-5 py-2 flex items-center space-x-2">
                        <i class="ph-duotone ph-user-circle text-2xl" id="authIconDesktop"></i>
                        <span id="authTextDesktop" class="font-bold text-lg">小尖兵報到</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要內容區 -->
    <main class="flex-grow max-w-[85rem] mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full relative">
        
        <!-- 背景裝飾小圖 (純 CSS 定位) -->
        <div class="absolute top-10 left-10 text-[#f4d068] opacity-30 text-5xl -z-10 -rotate-12"><i class="ph-duotone ph-star"></i></div>
        <div class="absolute bottom-20 right-10 text-[#72a1d4] opacity-30 text-6xl -z-10 rotate-12"><i class="ph-duotone ph-paper-plane-tilt"></i></div>
        
        <!-- 載入中動畫 -->
        <div id="loadingIndicator" class="flex justify-center items-center py-20">
            <div class="text-center">
                <i class="ph-duotone ph-pencil-circle animate-spin text-6xl text-[#72a1d4] mb-4"></i>
                <p class="title-font text-2xl text-[#5a5a5a]">翻開手帳中...</p>
            </div>
        </div>

        <!-- 札記網格 -->
        <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
        
        <!-- 無資料提示 -->
        <div id="emptyState" class="hidden text-center py-24">
            <i class="ph-duotone ph-ghost text-8xl mb-4 text-[#d1d5db]"></i>
            <p class="title-font text-2xl text-[#9ca3af]" id="emptyStateText">這裡還空空的，快來寫第一篇日記吧！</p>
        </div>

        <!-- 分頁控制區 -->
        <div id="paginationContainer" class="mt-14 flex justify-center hidden">
            <nav class="flex space-x-2" aria-label="Pagination" id="paginationControls"></nav>
        </div>
    </main>

    <footer class="bg-white border-t-[3px] border-dashed border-[#d1d5db] py-8 mt-auto">
        <div class="text-center text-md font-bold text-[#9ca3af]" id="footerText">
            &copy; 2026 我的心情札記 <i class="ph-fill ph-heart text-[#f29a9a]"></i>
        </div>
    </footer>

    <!-- ================= 互動視窗 (Modals) - 塗鴉風 ================= -->

    <!-- 全文檢視視窗 -->
    <div id="fullDescModal" class="fixed inset-0 bg-[#4a4a4a]/40 z-[60] hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="doodle-card p-6 sm:p-10 max-w-2xl w-full mx-4 my-auto relative bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGxpbmUgeDE9IjAiIHkxPSIyMCIgeDI9IjIwIiB5Mj0iMjAiIHN0cm9rZT0iI2U1ZTdlYiIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9zdmc+')]">
            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-16 h-6 bg-[#f4d068]/80 -rotate-2"></div> <!-- 頂部紙膠帶裝飾 -->
            
            <button onclick="closeModal('fullDescModal')" class="absolute top-4 right-4 text-[#9ca3af] hover:text-[#f29a9a] transition-colors">
                <i class="ph-bold ph-x text-3xl"></i>
            </button>
            <h2 id="fullDescModalTitle" class="title-font text-3xl text-[#4a4a4a] mb-6 border-b-2 border-dashed border-[#d1d5db] pb-3 pr-8"></h2>
            
            <div id="fullDescModalContent" class="ql-editor view-mode rich-text-content text-[#5a5a5a] text-lg overflow-y-auto max-h-[50vh] pr-4"></div>
            
            <div class="mt-8 flex justify-end">
                <button onclick="closeModal('fullDescModal')" class="doodle-btn bg-white hover:bg-[#f3f4f6] text-[#4a4a4a] px-6 py-2 text-lg">闔上日記</button>
            </div>
        </div>
    </div>

    <!-- 修改網站標題視窗 -->
    <div id="titleEditModal" class="fixed inset-0 bg-[#4a4a4a]/40 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="doodle-card p-8 max-w-sm w-full mx-4 relative bg-white">
            <h2 class="title-font text-2xl text-[#4a4a4a] mb-6 flex items-center">
                <i class="ph-duotone ph-pencil text-[#72a1d4] text-3xl mr-2"></i> 幫手帳取新名字
            </h2>
            <div class="space-y-5">
                <div>
                    <input type="text" id="editWebsiteTitle" class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold text-lg" placeholder="例如：班級日常">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button onclick="closeModal('titleEditModal')" class="doodle-btn bg-white text-[#5a5a5a] px-5 py-2">算了</button>
                    <button onclick="saveWebsiteTitle()" class="doodle-btn bg-[#72a1d4] text-white px-5 py-2">寫上去！</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理心情貼紙視窗 -->
    <div id="tagsManageModal" class="fixed inset-0 bg-[#4a4a4a]/40 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="doodle-card p-8 max-w-md w-full mx-4 relative bg-white">
            <button onclick="closeModal('tagsManageModal')" class="absolute top-4 right-4 text-[#9ca3af] hover:text-[#5a5a5a]">
                <i class="ph-bold ph-x text-2xl"></i>
            </button>
            <h2 class="title-font text-2xl text-[#4a4a4a] mb-6 flex items-center">
                <i class="ph-duotone ph-sticker text-[#f29a9a] text-3xl mr-2"></i> 收集可愛貼紙 (標籤)
            </h2>
            <div class="flex space-x-3 mb-6">
                <input type="text" id="newTagInput" placeholder="輸入新貼紙名稱..." class="flex-grow px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#f29a9a] outline-none font-bold">
                <button onclick="addNewTag()" class="doodle-btn bg-[#f29a9a] text-white px-5 py-2 whitespace-nowrap">做貼紙</button>
            </div>
            <div class="bg-[#fcfaf5] border-2 border-dashed border-[#d1d5db] rounded-xl p-4 max-h-60 overflow-y-auto">
                <p id="noTagsMsg" class="text-[#9ca3af] text-center py-4 hidden font-bold">還沒有任何貼紙喔~</p>
                <ul id="tagsListContainer" class="space-y-3"></ul>
            </div>
        </div>
    </div>

    <!-- 登入視窗 -->
    <div id="loginModal" class="fixed inset-0 bg-[#4a4a4a]/50 z-50 hidden flex items-center justify-center backdrop-blur-md">
        <div class="doodle-card p-10 max-w-sm w-full mx-4 transform transition-all bg-[#fefce8]">
            <div class="text-center mb-8">
                <i class="ph-duotone ph-key text-6xl text-[#f4d068] mb-2 -rotate-12 inline-block"></i>
                <h2 class="title-font text-3xl text-[#854d0e]">小尖兵驗證</h2>
            </div>
            <div class="space-y-5">
                <input type="text" id="loginUsername" class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#f4d068] outline-none font-bold text-lg bg-white" placeholder="通關密語(帳號)">
                <input type="password" id="loginPassword" class="w-full px-4 py-3 border-2 border-[#5a5a5a] rounded-xl focus:border-[#f4d068] outline-none font-bold text-lg bg-white" placeholder="神秘鑰匙(密碼)">
                <button onclick="checkLogin()" class="w-full doodle-btn bg-[#f4d068] text-[#854d0e] hover:bg-[#eab308] py-3 mt-4 text-xl flex justify-center items-center">
                    打開大門 <i id="loginSpinner" class="ph-bold ph-spinner animate-spin text-xl ml-2 hidden"></i>
                </button>
                <button onclick="closeModal('loginModal')" class="w-full text-center mt-4 text-[#9ca3af] hover:text-[#5a5a5a] font-bold underline decoration-wavy transition-colors">我走錯了，回去</button>
            </div>
        </div>
    </div>

    <!-- 新增/編輯札記視窗 -->
    <div id="photoModal" class="fixed inset-0 bg-[#4a4a4a]/50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="doodle-card p-8 sm:p-10 max-w-2xl w-full mx-4 my-auto relative bg-[#fcfaf5]">
            <button onclick="closeModal('photoModal')" class="absolute top-4 right-4 text-[#9ca3af] hover:text-[#5a5a5a]">
                <i class="ph-bold ph-x text-3xl"></i>
            </button>
            <div class="flex items-center mb-8 border-b-2 border-dashed border-[#d1d5db] pb-4">
                <i class="ph-duotone ph-note-pencil text-[#72a1d4] text-4xl mr-3 -rotate-6"></i>
                <h2 id="photoModalTitle" class="title-font text-3xl text-[#4a4a4a]">寫篇新日記吧</h2>
            </div>
            
            <form id="photoForm" onsubmit="savePhoto(event)" class="space-y-6">
                <input type="hidden" id="photoId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block font-bold text-[#5a5a5a] mb-1.5">今天的主題是... <span class="text-[#f29a9a]">*</span></label>
                        <input type="text" id="photoTitle" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold bg-white text-lg">
                    </div>
                    <div>
                        <label class="block font-bold text-[#5a5a5a] mb-1.5">哪一天發生的呢？ <span class="text-[#f29a9a]">*</span></label>
                        <input type="date" id="photoDate" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold bg-white text-lg">
                    </div>
                </div>

                <!-- 心情貼紙 -->
                <div>
                    <label class="block font-bold text-[#5a5a5a] mb-2">貼張心情貼紙吧 (可選多張)</label>
                    <div id="tagCheckboxesContainer" class="flex flex-wrap gap-3 p-4 bg-white border-2 border-[#e5e7eb] rounded-xl min-h-[60px]">
                        <!-- 動態產生 -->
                    </div>
                </div>

                <!-- 連結區塊，用不同顏色區分 -->
                <div class="bg-[#eff6ff] p-5 border-2 border-[#bfdbfe] rounded-xl space-y-4">
                    <div>
                        <label class="block font-bold text-[#1e3a8a] mb-1.5">1. 回憶百寶箱 (相簿資料夾連結) <span class="text-[#f29a9a]">*</span></label>
                        <input type="url" id="photoUrl" required placeholder="貼上 Google Drive 資料夾網址" class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold bg-white">
                    </div>
                    <div>
                        <label class="block font-bold text-[#1e3a8a] mb-1.5">2. 選一張最棒的照片當封面 (單張照片連結) <span class="text-[#f29a9a]">*</span></label>
                        <input type="url" id="thumbnailUrl" required placeholder="貼上 Drive 裡單張照片的網址" class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold bg-white">
                    </div>
                </div>
                
                <!-- 富文本編輯器 (Quill) -->
                <div>
                    <label class="block font-bold text-[#5a5a5a] mb-1.5">寫點詳細的內容吧~</label>
                    <div id="quill-editor" class="bg-white border-2 border-[#5a5a5a] rounded-xl"></div>
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="closeModal('photoModal')" class="doodle-btn bg-white text-[#5a5a5a] px-6 py-2 text-lg">下次再寫</button>
                    <button type="submit" class="doodle-btn bg-[#72a1d4] text-white px-8 py-2 text-lg flex items-center">
                        <i class="ph-bold ph-paper-plane-right mr-2"></i> 貼上手帳！
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 刪除確認視窗 -->
    <div id="deleteModal" class="fixed inset-0 bg-[#4a4a4a]/50 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="doodle-card p-8 max-w-sm w-full mx-4 text-center bg-white border-4 border-[#f29a9a]">
            <i class="ph-duotone ph-warning-octagon text-6xl text-[#f29a9a] mb-4"></i>
            <h2 class="title-font text-3xl text-[#5a5a5a] mb-2">確定要撕掉這頁嗎？</h2>
            <p class="font-bold text-[#9ca3af] mb-8">撕掉後就找不回來囉！</p>
            <input type="hidden" id="deleteId"><input type="hidden" id="deleteType" value="photo">
            <div class="flex justify-center space-x-4">
                <button onclick="closeModal('deleteModal')" class="doodle-btn bg-white text-[#5a5a5a] px-6 py-2 flex-1">保留</button>
                <button onclick="confirmDelete()" class="doodle-btn bg-[#f29a9a] text-white px-6 py-2 flex-1">狠心撕掉</button>
            </div>
        </div>
    </div>

    <!-- 帳號管理清單 -->
    <div id="accountListModal" class="fixed inset-0 bg-[#4a4a4a]/50 z-50 hidden flex items-center justify-center backdrop-blur-sm overflow-y-auto pt-10 pb-10">
        <div class="doodle-card p-8 max-w-lg w-full mx-4 my-auto relative bg-[#fcfaf5]">
            <button onclick="closeModal('accountListModal')" class="absolute top-4 right-4 text-[#9ca3af] hover:text-[#5a5a5a]"><i class="ph-bold ph-x text-3xl"></i></button>
            <div class="flex justify-between items-center mb-6 border-b-2 border-dashed border-[#d1d5db] pb-4">
                <h2 class="title-font text-3xl text-[#4a4a4a] flex items-center">
                    <i class="ph-duotone ph-users-three text-[#72a1d4] mr-2"></i> 夥伴名單
                </h2>
                <button onclick="openAccountEditModal()" class="doodle-btn bg-white border-2 border-[#72a1d4] text-[#72a1d4] px-4 py-1.5 text-sm flex items-center hover:bg-[#eff6ff]">
                    <i class="ph-bold ph-plus mr-1"></i> 新增夥伴
                </button>
            </div>
            <div class="bg-white border-2 border-[#e5e7eb] rounded-xl overflow-hidden">
                <table class="min-w-full"><tbody id="userListBody" class="divide-y-2 divide-dashed divide-[#e5e7eb]"></tbody></table>
            </div>
        </div>
    </div>

    <!-- 編輯帳號 -->
    <div id="accountEditModal" class="fixed inset-0 bg-[#4a4a4a]/50 z-[60] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="doodle-card p-8 max-w-sm w-full mx-4 relative bg-white border-t-8 border-[#72a1d4]">
            <h2 id="accountEditModalTitle" class="title-font text-2xl text-[#4a4a4a] mb-6">新增夥伴</h2>
            <form onsubmit="saveUser(event)" class="space-y-5">
                <input type="hidden" id="editUserId">
                <input type="text" id="editUsername" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold text-lg" placeholder="通關密語 (帳號)">
                <input type="password" id="editPassword" required class="w-full px-4 py-2 border-2 border-[#5a5a5a] rounded-xl focus:border-[#72a1d4] outline-none font-bold text-lg" placeholder="設定神秘鑰匙 (密碼)">
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal('accountEditModal')" class="doodle-btn bg-white text-[#5a5a5a] px-5 py-2">取消</button>
                    <button type="submit" class="doodle-btn bg-[#72a1d4] text-white px-6 py-2">歡迎加入！</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 吐司通知 (紙條風) -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 z-[70] flex items-center bg-[#fefce8] border-2 border-[#5a5a5a] text-[#4a4a4a] px-6 py-4 rounded-xl shadow-[4px_4px_0_#5a5a5a] pointer-events-none">
        <div class="absolute -top-2 left-4 w-6 h-4 bg-[#f29a9a]/80 -rotate-3"></div> <!-- 小紙膠帶 -->
        <i id="toastIcon" class="ph-duotone ph-check-circle text-[#72a1d4] text-3xl mr-3"></i>
        <span id="toastMessage" class="font-bold text-lg title-font">操作成功</span>
    </div>

    <!-- ================= JavaScript / Firebase 邏輯 ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let app, auth, db, currentUser;
        const systemAppId = 'default-album-app'; 

        let isAdmin = false;
        let usersData = [];
        let photosData = [];
        let globalSettings = { title: '我的心情札記', moodTags: [] };
        
        let currentPage = 1;
        const itemsPerPage = 8;
        let searchQuery = '';
        let quillEditor; 

        // --- 1. 系統初始化 ---
        const initSystem = async () => {
            try {
                // 初始化 Quill，隱藏太複雜的工具列，保持簡潔
                quillEditor = new Quill('#quill-editor', {
                    theme: 'snow',
                    placeholder: '把今天開心的事寫下來吧...',
                    modules: {
                        toolbar: [
                            [{ 'size': ['small', false, 'large'] }],
                            [{ 'color': [] }, { 'background': [] }],
                            ['bold', 'italic', 'underline'],
                            ['link', 'clean']
                        ]
                    }
                });

                const firebaseConfig = {
                    apiKey: "AIzaSyDCqmxkyEIuXW6dp1IjJKUGwiyheTGI8yc",
                    authDomain: "school-album-85fab.firebaseapp.com",
                    projectId: "school-album-85fab",
                    storageBucket: "school-album-85fab.firebasestorage.app",
                    messagingSenderId: "283771347276",
                    appId: "1:283771347276:web:9c7eca0a6f1cf5bd1c6fe9"
                };
                
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) setupRealtimeListeners();
                });

            } catch (error) {
                console.error("Initialization Error:", error);
                document.getElementById('loadingIndicator').innerHTML = `<p class="title-font text-[#f29a9a] text-2xl">糟糕，筆記本找不到了！</p>`;
            }
        };

        // --- 2. 即時監聽 ---
        const setupRealtimeListeners = () => {
            if (!currentUser) return;

            onSnapshot(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), (docSnap) => {
                if (docSnap.exists()) globalSettings = docSnap.data();
                else globalSettings = { title: '我的心情札記', moodTags: [] };
                updateGlobalUI();
            });

            onSnapshot(collection(db, 'artifacts', systemAppId, 'public', 'data', 'albums'), (snapshot) => {
                photosData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('loadingIndicator').classList.add('hidden');
                renderGallery();
            });

            onSnapshot(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), (snapshot) => {
                usersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderUsers();
            });
        };

        const updateGlobalUI = () => {
            document.title = globalSettings.title;
            // 處理標題底下的黃色裝飾線
            document.getElementById('navTitle').innerHTML = `${globalSettings.title}<span class="absolute -bottom-1 left-0 w-full h-1 bg-[#f4d068] -z-10 rounded-full opacity-60"></span>`;
            document.getElementById('footerText').innerHTML = `&copy; 2026 ${globalSettings.title} <i class="ph-fill ph-heart text-[#f29a9a]"></i>`;
            renderTagCheckboxes();
            renderManageTagsList();
        };

        // --- 3. 畫面渲染 ---
        const formatImageUrl = (url) => {
            if (!url) return '';
            const match = url.match(/(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=)([-a-zA-Z0-9_]+)/);
            if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1000`;
            return url; 
        };

        const renderGallery = () => {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            let filteredData = photosData;
            if (searchQuery) {
                filteredData = photosData.filter(photo => {
                    const cleanDesc = photo.desc ? photo.desc.replace(/<[^>]*>?/gm, '') : '';
                    return (photo.title && photo.title.toLowerCase().includes(searchQuery)) || 
                           (cleanDesc.toLowerCase().includes(searchQuery));
                });
            }

            if (filteredData.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('paginationContainer').classList.add('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                const sortedData = [...filteredData].sort((a, b) => new Date(b.date) - new Date(a.date));

                const totalPages = Math.ceil(sortedData.length / itemsPerPage);
                if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
                
                const paginatedData = sortedData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

                // 顏色輪替讓卡片更有變化 (手帳風)
                const bgColors = ['bg-[#fffcf5]', 'bg-[#fdf4f4]', 'bg-[#f0f7ff]', 'bg-[#fcfdfa]'];
                const clipColors = ['text-[#72a1d4]', 'text-[#f29a9a]', 'text-[#f4d068]', 'text-[#9ca3af]'];

                paginatedData.forEach((photo, idx) => {
                    let targetUrl = photo.url; let thumbUrl = photo.url;
                    if (photo.url && photo.url.includes("|||")) {
                        const parts = photo.url.split("|||"); targetUrl = parts[0]; thumbUrl = parts[1];
                    }

                    // 渲染心情貼紙 (不規則造型)
                    let tagsHtml = '';
                    if (photo.tags && photo.tags.length > 0) {
                        tagsHtml = `<div class="flex flex-wrap gap-2 mt-2 mb-1">` + 
                            photo.tags.map(t => `<span class="bg-white border-2 border-[#5a5a5a] text-[#4a4a4a] text-xs font-bold px-2 py-0.5" style="border-radius: 255px 15px 225px 15px/15px 225px 15px 255px; transform: rotate(${Math.random()*4-2}deg);">${t}</span>`).join('') + 
                            `</div>`;
                    }

                    let adminButtons = isAdmin ? `
                        <div class="absolute top-3 right-3 flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity z-20">
                            <button onclick="editPhoto(event, '${photo.id}')" class="bg-white border-2 border-[#5a5a5a] text-[#4a4a4a] p-1.5 rounded-full shadow-[2px_2px_0_#5a5a5a] hover:-translate-y-1 transition-transform" title="編輯這頁"><i class="ph-bold ph-pencil-simple text-lg"></i></button>
                            <button onclick="promptDelete(event, '${photo.id}', 'photo')" class="bg-[#f29a9a] border-2 border-[#5a5a5a] text-white p-1.5 rounded-full shadow-[2px_2px_0_#5a5a5a] hover:-translate-y-1 transition-transform" title="撕掉這頁"><i class="ph-bold ph-trash text-lg"></i></button>
                        </div>` : '';

                    const tempDiv = document.createElement('div'); tempDiv.innerHTML = photo.desc || '';
                    const plainText = tempDiv.textContent || tempDiv.innerText || "";
                    const needsReadMore = plainText.length > 45;

                    const readMoreBtn = needsReadMore ? 
                        `<button onclick="openFullDesc(event, '${photo.id}')" class="text-[#72a1d4] hover:text-[#5a8bc0] text-sm font-bold mt-2 flex items-center underline decoration-wavy transition-colors z-20 relative"><i class="ph-bold ph-caret-circle-double-down mr-1"></i>看全部...</button>` : '';

                    const cardBg = bgColors[idx % bgColors.length];
                    const clipColor = clipColors[idx % clipColors.length];

                    const card = document.createElement('div');
                    card.className = `doodle-card overflow-visible relative group flex flex-col ${cardBg} mt-4`; // 留出迴紋針空間
                    card.innerHTML = `
                        <!-- 裝飾迴紋針 -->
                        <div class="absolute -top-4 left-6 ${clipColor} text-4xl z-30 transform -rotate-12 drop-shadow-md"><i class="ph-fill ph-paperclip"></i></div>
                        
                        ${adminButtons}
                        <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" onclick="recordView('${photo.id}')" class="flex-grow flex flex-col group/link relative z-10 p-2">
                            <div class="image-container relative w-full pt-[75%] border-2 border-[#5a5a5a] rounded-lg bg-white">
                                <img src="${formatImageUrl(thumbUrl)}" onerror="if(this.src.includes('thumbnail')){ this.src=this.src.replace('thumbnail?id=','uc?export=view&id=').replace('&sz=w1000',''); } else { this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCA4MDAgNjAwIiBwcmVzZXJ2ZUFzcGVjdFJhdGlvPSJub25lIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjFmNWY5Ii8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjI0IiBmaWxsPSIjOTRhM2I4IiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj7ms5LmnInnhA+niYc8L3RleHQ+PC9zdmc+'; }" class="absolute top-0 left-0 w-full h-full object-cover">
                                <div class="absolute inset-0 bg-[#4a4a4a] bg-opacity-0 group-hover/link:bg-opacity-20 transition-all duration-300 flex items-center justify-center">
                                    <div class="bg-white text-[#4a4a4a] px-4 py-2 rounded-2xl font-bold opacity-0 group-hover/link:opacity-100 transform translate-y-4 group-hover/link:translate-y-0 transition-all duration-300 border-2 border-[#5a5a5a] shadow-[2px_2px_0_#5a5a5a] text-lg title-font">
                                        去看看！
                                    </div>
                                </div>
                            </div>
                            <div class="pt-4 pb-2 px-1 flex-grow flex flex-col">
                                <h3 class="title-font text-2xl text-[#4a4a4a] line-clamp-1 group-hover/link:text-[#72a1d4] transition-colors relative inline-block">
                                    ${photo.title}
                                </h3>
                                <p class="text-sm text-[#9ca3af] flex items-center mt-1 font-bold font-sans"><i class="ph-bold ph-calendar-blank mr-1.5"></i> ${photo.date}</p>
                                ${tagsHtml}
                                <div class="flex flex-col mt-auto pt-3">
                                    <div class="text-[#5a5a5a] text-md line-clamp-3 rich-text-content leading-relaxed">${photo.desc || '<span class="text-gray-300">沒寫什麼...</span>'}</div>
                                    <div class="flex justify-between items-end mt-2">
                                        <div>${readMoreBtn}</div>
                                        <div class="flex items-center text-[#9ca3af] text-sm shrink-0 font-bold" title="看過的人數">
                                            <i class="ph-bold ph-eye mr-1.5"></i><span id="view-count-${photo.id}">${photo.views || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </a>
                    `;
                    grid.appendChild(card);
                });
                renderPagination(sortedData.length, totalPages);
            }
        };

        // --- 4. 分頁邏輯 (手繪風格) ---
        const changePage = (page) => { currentPage = page; renderGallery(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        const renderPagination = (totalItems, totalPages) => {
            const controls = document.getElementById('paginationControls');
            document.getElementById('paginationContainer').classList.toggle('hidden', totalPages <= 1);
            if(totalPages <= 1) return;
            
            const btnClass = "doodle-btn px-4 py-2 bg-white text-[#4a4a4a] hover:bg-[#f3f4f6] mx-1 text-lg title-font";
            const activeClass = "doodle-btn px-4 py-2 bg-[#72a1d4] text-white mx-1 text-lg title-font translate-y-[2px] shadow-none";
            const disabledClass = "px-4 py-2 text-[#d1d5db] mx-1 text-lg title-font cursor-not-allowed";

            controls.innerHTML = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="${currentPage===1?disabledClass:btnClass}"><i class="ph-bold ph-arrow-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                controls.innerHTML += `<button onclick="changePage(${i})" class="${i===currentPage?activeClass:btnClass}">${i}</button>`;
            }
            controls.innerHTML += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="${currentPage===totalPages?disabledClass:btnClass}"><i class="ph-bold ph-arrow-right"></i></button>`;
        };

        // --- 5. Firebase 操作 ---

        const saveWebsiteTitle = async () => {
            const newTitle = document.getElementById('editWebsiteTitle').value.trim();
            if (!newTitle) return;
            try {
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { title: newTitle }, { merge: true });
                closeModal('titleEditModal');
                showToast("手帳換新名字囉！");
            } catch (e) { showToast("修改失敗", "error"); }
        };

        const renderManageTagsList = () => {
            const list = document.getElementById('tagsListContainer');
            const noMsg = document.getElementById('noTagsMsg');
            list.innerHTML = '';
            
            const tags = globalSettings.moodTags || [];
            if(tags.length === 0) { noMsg.classList.remove('hidden'); return; }
            noMsg.classList.add('hidden');

            tags.forEach((tag, index) => {
                list.innerHTML += `
                    <li class="flex justify-between items-center bg-white border-2 border-[#5a5a5a] px-4 py-2 rounded-xl shadow-[2px_2px_0_#e0e0e0]">
                        <span class="font-bold text-[#4a4a4a]">${tag}</span>
                        <button onclick="deleteTag(${index})" class="text-[#f29a9a] hover:text-[#e07a7a] transition-colors"><i class="ph-bold ph-trash text-xl"></i></button>
                    </li>`;
            });
        };

        const renderTagCheckboxes = () => {
            const container = document.getElementById('tagCheckboxesContainer');
            if(!container) return;
            const tags = globalSettings.moodTags || [];
            if(tags.length === 0) { container.innerHTML = '<span class="text-[#9ca3af] font-bold">先去工具箱做點貼紙吧！</span>'; return; }
            
            container.innerHTML = tags.map((tag, i) => `
                <label class="inline-flex items-center bg-[#f3f4f6] hover:bg-[#e5e7eb] border-2 border-[#5a5a5a] px-3 py-1 rounded-xl cursor-pointer transition-colors shadow-[1px_2px_0_#d1d5db]">
                    <input type="checkbox" value="${tag}" class="w-4 h-4 text-[#72a1d4] border-2 border-[#5a5a5a] rounded focus:ring-0 tag-checkbox">
                    <span class="ml-2 font-bold text-[#4a4a4a] text-sm">${tag}</span>
                </label>
            `).join('');
        };

        const addNewTag = async () => {
            const input = document.getElementById('newTagInput');
            const newTag = input.value.trim();
            if (!newTag) return;
            
            const currentTags = globalSettings.moodTags || [];
            if(currentTags.includes(newTag)) { showToast("已經有這張貼紙囉", "error"); return; }
            
            try {
                const updatedTags = [...currentTags, newTag];
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { moodTags: updatedTags }, { merge: true });
                input.value = '';
                showToast("新貼紙做好了！");
            } catch (e) { showToast("做貼紙失敗", "error"); }
        };

        const deleteTag = async (index) => {
            try {
                let tags = [...globalSettings.moodTags];
                tags.splice(index, 1);
                await setDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'settings', 'global'), { moodTags: tags }, { merge: true });
                showToast("貼紙丟掉囉");
            } catch(e) { showToast("丟棄失敗", "error"); }
        };

        const savePhoto = async (event) => {
            event.preventDefault();
            if (!currentUser) return;

            const checkedTags = Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(cb => cb.value);
            const richDesc = quillEditor.root.innerHTML;
            const id = document.getElementById('photoId').value;
            const combinedUrl = document.getElementById('photoUrl').value + "|||" + document.getElementById('thumbnailUrl').value;
            
            const payload = {
                title: document.getElementById('photoTitle').value,
                url: combinedUrl,
                date: document.getElementById('photoDate').value,
                desc: richDesc === '<p><br></p>' ? '' : richDesc, 
                tags: checkedTags
            };

            closeModal('photoModal');
            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id), payload);
                    showToast("這頁修改好囉！");
                } else {
                    payload.views = 0; 
                    await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'albums'), payload);
                    showToast("貼上新手帳囉！");
                }
            } catch (error) { showToast("儲存失敗", "error"); }
        };

        const editPhoto = (event, id) => {
            event.preventDefault(); event.stopPropagation();
            const photo = photosData.find(p => p.id === id);
            if (!photo) return;

            let targetUrl = photo.url || ''; let thumbUrl = photo.url || '';
            if (photo.url && photo.url.includes("|||")) {
                const parts = photo.url.split("|||"); targetUrl = parts[0]; thumbUrl = parts[1];
            }

            document.getElementById('photoId').value = photo.id;
            document.getElementById('photoTitle').value = photo.title;
            document.getElementById('photoUrl').value = targetUrl;
            document.getElementById('thumbnailUrl').value = thumbUrl;
            document.getElementById('photoDate').value = photo.date;
            
            quillEditor.root.innerHTML = photo.desc || '';
            document.querySelectorAll('.tag-checkbox').forEach(cb => { cb.checked = (photo.tags && photo.tags.includes(cb.value)); });
            
            document.getElementById('photoModalTitle').innerText = '修改這頁日記';
            document.getElementById('photoModal').classList.remove('hidden');
        };

        const recordView = async (id) => {
            const photo = photosData.find(p => p.id === id);
            if (photo && currentUser) {
                const newViews = (photo.views || 0) + 1;
                document.getElementById(`view-count-${id}`).innerText = newViews;
                await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id), { views: newViews });
            }
        };

        const confirmDelete = async () => {
            if (!currentUser) return;
            const id = document.getElementById('deleteId').value;
            const type = document.getElementById('deleteType').value;
            closeModal('deleteModal');
            try {
                if (type === 'photo') { await deleteDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'albums', id)); showToast("那一頁被撕掉了"); }
                else { await deleteDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'accounts', id)); showToast("夥伴已移除"); }
            } catch (error) { showToast("刪除失敗", "error"); }
        };

        const openFullDesc = (event, id) => {
            event.preventDefault(); event.stopPropagation();
            const photo = photosData.find(p => p.id === id);
            if (photo) {
                document.getElementById('fullDescModalTitle').innerText = photo.title;
                document.getElementById('fullDescModalContent').innerHTML = photo.desc || '沒有寫什麼...';
                document.getElementById('fullDescModal').classList.remove('hidden');
            }
        };

        // --- 6. 權限與登入 ---
        const toggleAuth = () => {
            if (isAdmin) { isAdmin = false; updateAuthUI(); showToast("小尖兵已登出"); } 
            else { document.getElementById('loginModal').classList.remove('hidden'); }
        };

        const checkLogin = async () => {
            const u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
            if (!u || !p) { showToast("要輸入通關密語喔！", "error"); return; }
            if (usersData.find(usr => usr.username === u && usr.password === p)) {
                isAdmin = true; closeModal('loginModal'); updateAuthUI(); showToast("歡迎回來！");
            } else if (usersData.length === 0 && u === 'admin' && p === 'admin123') {
                isAdmin = true; await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), { username: u, password: p });
                closeModal('loginModal'); updateAuthUI(); showToast("第一個小尖兵報到！");
            } else { showToast("密語好像不對喔", "error"); }
        };

        const updateAuthUI = () => {
            document.getElementById('authTextDesktop').innerText = isAdmin ? "偷偷溜走 (登出)" : "小尖兵報到";
            document.getElementById('authIconDesktop').className = isAdmin ? "ph-duotone ph-sign-out text-2xl text-[#f29a9a]" : "ph-duotone ph-user-circle text-2xl text-[#4a4a4a]";
            document.getElementById('authTextMobile').innerText = isAdmin ? "溜走" : "小尖兵";
            document.getElementById('authIconMobile').className = isAdmin ? "ph-duotone ph-sign-out text-xl text-[#f29a9a]" : "ph-duotone ph-user-circle text-xl text-[#4a4a4a]";
            
            document.getElementById('adminToolbar').classList.toggle('hidden', !isAdmin);
            document.getElementById('editTitleBtn').classList.toggle('hidden', !isAdmin);
            renderGallery();
        };

        const renderUsers = () => {
            document.getElementById('userListBody').innerHTML = usersData.length ? usersData.map(u => `
                <tr class="hover:bg-[#fcfaf5] transition-colors"><td class="px-5 py-4 text-lg font-bold text-[#4a4a4a] title-font">${u.username}</td>
                <td class="px-5 py-4 text-right"><button onclick="editUser('${u.id}')" class="text-[#72a1d4] hover:text-[#5a8bc0] mr-4 font-bold"><i class="ph-bold ph-key mr-1"></i>換鑰匙</button>
                <button onclick="promptDelete(null, '${u.id}', 'user')" class="text-[#f29a9a] hover:text-[#e07a7a] font-bold"><i class="ph-bold ph-user-minus mr-1"></i>移除</button></td></tr>`).join('') 
                : '<tr><td colspan="2" class="px-5 py-6 text-center text-[#9ca3af] font-bold">還沒有任何夥伴</td></tr>';
        };

        const saveUser = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const payload = { username: document.getElementById('editUsername').value, password: document.getElementById('editPassword').value };
            closeModal('accountEditModal');
            id ? await updateDoc(doc(db, 'artifacts', systemAppId, 'public', 'data', 'accounts', id), payload) : await addDoc(collection(db, 'artifacts', systemAppId, 'public', 'data', 'accounts'), payload);
            showToast(id ? "密碼換好了" : "新夥伴加入囉！");
        };

        // --- 7. UI 控制函數 ---
        const handleSearch = () => { searchQuery = document.getElementById('searchInput').value.trim().toLowerCase(); currentPage = 1; renderGallery(); };
        const closeModal = (id) => document.getElementById(id).classList.add('hidden');
        const openTitleModal = () => { document.getElementById('editWebsiteTitle').value = globalSettings.title; document.getElementById('titleEditModal').classList.remove('hidden'); };
        const openTagsModal = () => { document.getElementById('tagsManageModal').classList.remove('hidden'); };
        const promptDelete = (event, id, type) => { if(event) { event.preventDefault(); event.stopPropagation(); } document.getElementById('deleteId').value = id; document.getElementById('deleteType').value = type; document.getElementById('deleteModal').classList.remove('hidden'); };
        const openAccountListModal = () => document.getElementById('accountListModal').classList.remove('hidden');
        const openAccountEditModal = () => { document.getElementById('editUserId').value = ''; document.getElementById('accountEditModalTitle').innerText = '新增夥伴'; document.getElementById('accountEditModal').classList.remove('hidden'); };
        const editUser = (id) => { const u = usersData.find(x => x.id === id); document.getElementById('editUserId').value = u.id; document.getElementById('editUsername').value = u.username; document.getElementById('editPassword').value = u.password; document.getElementById('accountEditModalTitle').innerText = '換把新鑰匙'; document.getElementById('accountEditModal').classList.remove('hidden'); };
        const openPhotoModal = () => { document.getElementById('photoForm').reset(); document.getElementById('photoId').value = ''; document.getElementById('photoDate').value = new Date().toISOString().split('T')[0]; quillEditor.root.innerHTML = ''; document.querySelectorAll('.tag-checkbox').forEach(cb => cb.checked = false); document.getElementById('photoModalTitle').innerText = '寫篇新日記吧'; document.getElementById('photoModal').classList.remove('hidden'); };
        
        let toastTimeout;
        const showToast = (msg, type = 'success') => {
            document.getElementById('toastMessage').innerText = msg;
            document.getElementById('toastIcon').className = type === 'success' ? "ph-duotone ph-check-circle text-[#72a1d4] text-3xl mr-3" : "ph-duotone ph-warning-circle text-[#f29a9a] text-3xl mr-3";
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        };

        Object.assign(window, { toggleAuth, checkLogin, closeModal, openPhotoModal, editPhoto, savePhoto, promptDelete, confirmDelete, recordView, openAccountListModal, openAccountEditModal, editUser, saveUser, handleSearch, changePage, openTitleModal, saveWebsiteTitle, openTagsModal, addNewTag, deleteTag, openFullDesc });

        initSystem();
    </script>
</body>
</html>
